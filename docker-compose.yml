# Lumen full-stack runtime entrypoint (postgres + redis + api + worker + web + tgbot/migrate/bootstrap).
# Image tags pulled from GHCR are pinned via LUMEN_IMAGE_TAG (see docs/docker-full-stack-cutover-plan.md §6.4.1).
# tgbot / migrate / bootstrap live behind compose profiles so default `up -d` only starts the core stack.

x-service-hardening: &service-hardening
  init: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  ulimits:
    nofile:
      soft: ${LUMEN_ULIMIT_NOFILE_SOFT:-65536}
      hard: ${LUMEN_ULIMIT_NOFILE_HARD:-65536}
    nproc: ${LUMEN_ULIMIT_NPROC:-4096}
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile.python
  args:
    LUMEN_VERSION: "${LUMEN_VERSION:-dev}"
    LUMEN_APP_UID: "${LUMEN_APP_UID:-10001}"
    LUMEN_APP_GID: "${LUMEN_APP_GID:-10001}"

x-redis-url-env: &redis-url-env
  REDIS_URL: "${REDIS_URL:-redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0}"

x-app-runtime-env: &app-runtime-env
  <<: *redis-url-env
  DATABASE_URL: "${DATABASE_URL:-postgresql+asyncpg://${DB_USER:?Set DB_USER in .env}:${DB_PASSWORD:?Set DB_PASSWORD in .env}@postgres:5432/${DB_NAME:?Set DB_NAME in .env}}"
  SESSION_SECRET: "${SESSION_SECRET:?Set SESSION_SECRET in .env}"
  BYOK_API_KEY_MASTER_SECRET: "${BYOK_API_KEY_MASTER_SECRET:?Set BYOK_API_KEY_MASTER_SECRET in .env}"

services:
  postgres:
    <<: *service-hardening
    # pgvector/pgvector:pg16 = postgres:16 (Debian) + pgvector ext 预装.
    # account memory 0018 migration 需要 vector extension; alpine 镜像没装.
    # 镜像内 postgres uid=999 (Debian default), 与之前 alpine 的 uid=70 不同,
    # update.sh 升级路径会自动 chown 数据目录 (70 → 999).
    image: pgvector/pgvector:pg16
    container_name: lumen-pg
    user: "${LUMEN_POSTGRES_UID:-999}:${LUMEN_POSTGRES_GID:-999}"
    restart: unless-stopped
    shm_size: "256m"
    stop_grace_period: 60s
    environment:
      POSTGRES_USER: "${DB_USER:?Set DB_USER in .env}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env}"
      POSTGRES_DB: "${DB_NAME:?Set DB_NAME in .env}"
    cpus: "1.0"
    mem_limit: 1g
    # 不映射到 host：api/worker/tgbot 走 lumen_backend network 即可。
    # 调试用 `docker exec lumen-pg psql ...`；外部 GUI 工具按需 ssh -L 隧道。
    volumes:
      - ${LUMEN_DB_ROOT:-/opt/lumendata}/postgres:/var/lib/postgresql/data
    networks:
      - lumen_backend
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:?Set DB_USER in .env}", "-d", "${DB_NAME:?Set DB_NAME in .env}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    <<: *service-hardening
    image: redis:7.4-alpine
    container_name: lumen-redis
    user: "${LUMEN_REDIS_UID:-999}:${LUMEN_REDIS_GID:-999}"
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"
    cpus: "0.5"
    mem_limit: 512m
    # 不映射到 host：调试用 `docker exec lumen-redis redis-cli`。
    entrypoint: ["/bin/sh", "/usr/local/bin/lumen-redis-entrypoint"]
    volumes:
      - ${LUMEN_DB_ROOT:-/opt/lumendata}/redis:/data
      - ./deploy/redis/redis-entrypoint.sh:/usr/local/bin/lumen-redis-entrypoint:ro
    networks:
      - lumen_backend
    healthcheck:
      # REDIS_PASSWORD 用普通展开：`${VAR:?msg}` 是 shell 强制语法，空字符串
      # 或未导出都会让 healthcheck 永远 fail。fail-fast 留给 entrypoint
      # （deploy/redis/redis-entrypoint.sh）和 compose 顶部 redis-url-env 处理。
      test: ["CMD-SHELL", "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli --no-auth-warning --raw ping | grep -qx PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    <<: *service-hardening
    image: ${LUMEN_IMAGE_REGISTRY:-ghcr.io/cyeinfpro}/lumen-api:${LUMEN_IMAGE_TAG:-latest}
    container_name: lumen-api
    labels:
      lumen.color: "blue"
    build: *app-build
    working_dir: /app/apps/api
    command:
      - "uvicorn"
      - "app.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--workers"
      - "${LUMEN_API_WORKERS:-2}"
      - "--limit-max-requests"
      - "${LUMEN_API_LIMIT_MAX_REQUESTS:-10000}"
      - "--limit-max-requests-jitter"
      - "${LUMEN_API_LIMIT_MAX_REQUESTS_JITTER:-1000}"
      - "--timeout-keep-alive"
      - "${LUMEN_API_TIMEOUT_KEEP_ALIVE:-60}"
      - "--timeout-graceful-shutdown"
      - "${LUMEN_API_TIMEOUT_GRACEFUL_SHUTDOWN:-30}"
      - "--timeout-worker-healthcheck"
      - "${LUMEN_API_TIMEOUT_WORKER_HEALTHCHECK:-10}"
    user: "${LUMEN_APP_UID:-10001}:${LUMEN_APP_GID:-10001}"
    group_add:
      - "${LUMEN_APP_STORAGE_GID:-10001}"
    env_file: ${LUMEN_COMPOSE_ENV_FILE:-.env}
    restart: unless-stopped
    stop_grace_period: 60s
    cpus: "1.5"
    mem_limit: 2g
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${API_BIND_PORT:-8000}:8000"
    environment:
      <<: *app-runtime-env
      # 容器化部署下让 admin_update 走 path-unit 触发，跳过容器内 systemctl 探测。
      # 触发文件由 lumen-api 写到挂载的 backup 目录，宿主机 PID 1 监听并启动
      # lumen-update-runner.service 真正执行 update.sh。
      LUMEN_UPDATE_VIA_TRIGGER: "1"
      # Manual backup follows the same host-side trigger model: the container
      # writes .backup.trigger, PID 1 runs lumen-backup.service with Docker CLI.
      LUMEN_BACKUP_VIA_TRIGGER: "1"
    volumes:
      - ${LUMEN_DATA_ROOT:-/opt/lumendata}/storage:/opt/lumendata/storage
      - ${LUMEN_DATA_ROOT:-/opt/lumendata}/backup:/opt/lumendata/backup
      # admin_update / admin_backups 用 _discover_scripts_dir() 定位 update/backup
      # 脚本，做 preflight 校验。镜像里不打包 scripts/，由 release 目录挂载提供。
      - ./scripts:/app/scripts:ro
      # admin_update 需要读取宿主 release 元数据，避免容器内误判为 0.0.0/unknown。
      - ${LUMEN_UPDATE_ROOT:-/opt/lumen}:/opt/lumen:ro
      # admin_storage 与 host 上的 lumen-storage-{mount,apply,test} 单元用这个目录
      # 双向通信：API 写 storage.conf / apply.trigger，host 写 status.json / last-*.json。
      # 此目录不在 /opt/lumendata 上，所以 SMB 切换时不会被卸载，避免鸡生蛋。
      - /var/lib/lumen-storage:/var/lib/lumen-storage
    networks:
      - lumen_backend
    healthcheck:
      # 用 stdlib urllib 做健康探测：镜像内不一定装了 curl/wget，依赖外部
      # 二进制会让 worker 的 depends_on: service_healthy 永远阻塞。
      # python 始终在镜像里（runtime 本体），最稳。
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read(); sys.exit(0)\" || exit 1"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  worker:
    <<: *service-hardening
    image: ${LUMEN_IMAGE_REGISTRY:-ghcr.io/cyeinfpro}/lumen-worker:${LUMEN_IMAGE_TAG:-latest}
    container_name: lumen-worker
    build: *app-build
    working_dir: /app/apps/worker
    command:
      - "python"
      - "-c"
      - |
        import logging.config
        import os

        from arq.logs import default_log_config
        from arq.worker import run_worker
        from app.main import WorkerSettings

        logging.config.dictConfig(default_log_config(False))
        run_worker(
            WorkerSettings,
            health_check_interval=int(os.getenv("LUMEN_WORKER_HEALTH_INTERVAL", "30")),
            health_check_key=os.getenv("LUMEN_WORKER_HEALTH_KEY", "arq:queue:health-check"),
        )
    user: "${LUMEN_APP_UID:-10001}:${LUMEN_APP_GID:-10001}"
    group_add:
      - "${LUMEN_APP_STORAGE_GID:-10001}"
    env_file: ${LUMEN_COMPOSE_ENV_FILE:-.env}
    environment:
      <<: *app-runtime-env
      LUMEN_WORKER_HEALTH_INTERVAL: "${LUMEN_WORKER_HEALTH_INTERVAL:-30}"
      LUMEN_WORKER_HEALTH_KEY: "${LUMEN_WORKER_HEALTH_KEY:-arq:queue:health-check}"
    restart: unless-stopped
    stop_signal: SIGTERM
    # 4K long task envelope: arq 1800s task timeout + 30s buffer; do not shorten (see §8.5).
    stop_grace_period: 1830s
    cpus: "2.0"
    mem_limit: 3g
    # Prometheus metrics 端口 — 默认绑 127.0.0.1，宿主上的 prom 才能抓；docker network 内
    # 仍可用 worker:9100 直连。WORKER_METRICS_BIND 留口子，需要外部 prom 时改 0.0.0.0。
    ports:
      - "${WORKER_METRICS_BIND:-127.0.0.1}:9100:9100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ${LUMEN_DATA_ROOT:-/opt/lumendata}/storage:/opt/lumendata/storage
    networks:
      - lumen_backend
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          python - <<'PY'
          import os
          import sys
          import redis

          redis_client = redis.from_url(os.environ["REDIS_URL"])
          key = os.getenv("LUMEN_WORKER_HEALTH_KEY", "arq:queue:health-check")
          sys.exit(0 if redis_client.get(key) else 1)
          PY
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  web:
    <<: *service-hardening
    image: ${LUMEN_IMAGE_REGISTRY:-ghcr.io/cyeinfpro}/lumen-web:${LUMEN_IMAGE_TAG:-latest}
    container_name: lumen-web
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        LUMEN_VERSION: "${LUMEN_VERSION:-dev}"
        LUMEN_BACKEND_URL: "http://api:8000"
        NPM_VERSION: "${NPM_VERSION:-10.9.0}"
    restart: unless-stopped
    stop_grace_period: 30s
    cpus: "1.0"
    mem_limit: 1g
    environment:
      LUMEN_BACKEND_URL: "http://api:8000"
      NEXT_PUBLIC_API_BASE: "/api"
      NODE_ENV: "production"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_BIND_HOST:-127.0.0.1}:3000:3000"
    networks:
      - lumen_backend
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"const req = require('http').request({ host: '127.0.0.1', port: 3000, path: '/healthz', method: 'HEAD' }, (r) => { process.exit(r.statusCode >= 200 && r.statusCode < 400 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.setTimeout(5000, function () { this.destroy(); process.exit(1); }); req.end();\""
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  tgbot:
    <<: *service-hardening
    image: ${LUMEN_IMAGE_REGISTRY:-ghcr.io/cyeinfpro}/lumen-tgbot:${LUMEN_IMAGE_TAG:-latest}
    container_name: lumen-tgbot
    build: *app-build
    working_dir: /app/apps/tgbot
    command:
      - "/bin/sh"
      - "-ec"
      - |
        : "$${TELEGRAM_BOT_SHARED_SECRET:?Set TELEGRAM_BOT_SHARED_SECRET in .env when enabling tgbot}"
        exec python -m app.main
    # 与 api/worker 一致：先 env_file 读 .env，environment 块再覆盖关键变量。
    # 没 env_file 会让 tgbot 漏掉 admin / DB / observability 等共用配置。
    env_file: ${LUMEN_COMPOSE_ENV_FILE:-.env}
    environment:
      <<: *redis-url-env
      # tgbot 容器要走 docker network 调 lumen-api，不能用 config.py 里的
      # 127.0.0.1:8000 默认值（那指向 tgbot 容器自己的 loopback）。
      LUMEN_API_BASE: "http://api:8000"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_BOT_SHARED_SECRET: "${TELEGRAM_BOT_SHARED_SECRET:-}"
      TELEGRAM_PROXY_URL: "${TELEGRAM_PROXY_URL:-}"
      DOWNLOAD_TMP_DIR: "${DOWNLOAD_TMP_DIR:-}"
      BOT_MODE: "${BOT_MODE:-polling}"
      WEBHOOK_URL: "${WEBHOOK_URL:-}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      TELEGRAM_ALLOWED_USER_IDS: "${TELEGRAM_ALLOWED_USER_IDS:-}"
    restart: unless-stopped
    stop_grace_period: 30s
    cpus: "0.5"
    mem_limit: 512m
    profiles: ["tgbot"]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - lumen_backend
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          python - <<'PY'
          import os
          import sys
          import redis

          redis.from_url(os.environ["REDIS_URL"]).ping()
          needle = b"\x00-m\x00app.main\x00"
          self_pid = str(os.getpid())
          for pid in os.listdir("/proc"):
              if not pid.isdigit() or pid == self_pid:
                  continue
              try:
                  with open(f"/proc/{pid}/cmdline", "rb") as fh:
                      if needle in fh.read():
                          sys.exit(0)
              except OSError:
                  pass
          sys.exit(1)
          PY
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  migrate:
    <<: *service-hardening
    image: ${LUMEN_IMAGE_REGISTRY:-ghcr.io/cyeinfpro}/lumen-api:${LUMEN_IMAGE_TAG:-latest}
    build: *app-build
    working_dir: /app/apps/api
    command: ["alembic", "upgrade", "head"]
    environment:
      <<: *app-runtime-env
      APP_ENV: "${APP_ENV:-dev}"
      IMAGE_PROXY_SECRET: "${IMAGE_PROXY_SECRET:-}"
      TELEGRAM_BOT_SHARED_SECRET: "${TELEGRAM_BOT_SHARED_SECRET:-}"
    restart: "no"
    profiles: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lumen_backend

  bootstrap:
    <<: *service-hardening
    image: ${LUMEN_IMAGE_REGISTRY:-ghcr.io/cyeinfpro}/lumen-api:${LUMEN_IMAGE_TAG:-latest}
    build: *app-build
    working_dir: /app/apps/api
    command:
      - "/bin/sh"
      - "-ec"
      - |
        : "$${LUMEN_ADMIN_EMAIL:?Set LUMEN_ADMIN_EMAIL when running bootstrap profile}"
        : "$${LUMEN_ADMIN_PASSWORD:?Set LUMEN_ADMIN_PASSWORD when running bootstrap profile}"
        exec python -m app.scripts.bootstrap
    environment:
      <<: *app-runtime-env
      APP_ENV: "${APP_ENV:-dev}"
      IMAGE_PROXY_SECRET: "${IMAGE_PROXY_SECRET:-}"
      TELEGRAM_BOT_SHARED_SECRET: "${TELEGRAM_BOT_SHARED_SECRET:-}"
      LUMEN_ADMIN_EMAIL: "${LUMEN_ADMIN_EMAIL:-}"
      LUMEN_ADMIN_PASSWORD: "${LUMEN_ADMIN_PASSWORD:-}"
    restart: "no"
    profiles: ["bootstrap"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lumen_backend

networks:
  lumen_backend:
    driver: bridge
