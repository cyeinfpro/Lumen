<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumen</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101014;
        --panel: #19191f;
        --panel-2: #202027;
        --fg: #f6f1e7;
        --muted: #aaa39a;
        --line: #34323a;
        --accent: #d8a84f;
        --danger: #ff6b6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 18% 18%, rgba(216, 168, 79, 0.16), transparent 28rem),
          linear-gradient(135deg, #101014 0%, #15151a 48%, #202027 100%);
        color: var(--fg);
        font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(760px, calc(100vw - 40px));
        border: 1px solid var(--line);
        border-radius: 16px;
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
        overflow: hidden;
      }
      .content { padding: 28px; }
      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 24px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
      }
      .logo { font-weight: 720; letter-spacing: 0; }
      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        padding: 5px 10px;
        font-size: 12px;
      }
      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.25;
        letter-spacing: 0;
      }
      p { margin: 10px 0 0; color: var(--muted); line-height: 1.65; }
      .status {
        display: grid;
        gap: 14px;
      }
      .spinner {
        width: 24px;
        height: 24px;
        border: 2px solid rgba(246, 241, 231, 0.22);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error {
        border-left: 3px solid var(--danger);
        padding-left: 16px;
      }
      code, pre {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }
      pre {
        margin: 16px 0 0;
        max-height: 190px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel-2);
        color: #f3d4d4;
        padding: 12px;
      }
      dl {
        display: grid;
        gap: 10px;
        margin: 18px 0 0;
      }
      dt {
        color: var(--muted);
        font-size: 12px;
      }
      dd {
        margin: 3px 0 0;
        word-break: break-all;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 22px;
      }
      button {
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        color: var(--fg);
        padding: 0 13px;
        font: inherit;
        cursor: pointer;
      }
      button.primary {
        border-color: color-mix(in srgb, var(--accent) 70%, var(--line));
        background: var(--accent);
        color: #1b1406;
        font-weight: 650;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .note {
        margin-top: 14px;
        min-height: 20px;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <div class="logo">Lumen Desktop</div>
        <div class="pill" id="phase">starting</div>
      </div>
      <div class="content" id="root">
        <div class="status">
          <div class="spinner" aria-hidden="true"></div>
          <div>
            <h1>正在启动 Lumen</h1>
            <p>正在拉起本机 API、Worker、Web 和 Redis 运行时。</p>
          </div>
        </div>
      </div>
    </main>
    <script>
      const root = document.getElementById("root");
      const phase = document.getElementById("phase");
      let note = "";
      let busy = false;

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function invoke(command, args) {
        const tauriInvoke =
          window.__TAURI__ &&
          window.__TAURI__.core &&
          window.__TAURI__.core.invoke;
        if (!tauriInvoke) {
          return Promise.reject(new Error("Tauri bridge is unavailable"));
        }
        return tauriInvoke(command, args);
      }

      function renderLoading(status) {
        phase.textContent = status && status.ready ? "ready" : "starting";
        root.innerHTML = `
          <div class="status">
            <div class="spinner" aria-hidden="true"></div>
            <div>
              <h1>${status && status.ready ? "服务已就绪" : "正在启动 Lumen"}</h1>
              <p>${status && status.ready ? "正在打开主界面。" : "正在拉起本机 API、Worker、Web 和 Redis 运行时。"}</p>
            </div>
          </div>
          <div class="note">${escapeHtml(note)}</div>
        `;
      }

      function renderError(error) {
        phase.textContent = "failed";
        root.innerHTML = `
          <div class="error">
            <h1>Lumen 启动失败</h1>
            <p>本机运行时没有完全就绪。你可以先导出诊断包，再重试启动或重启应用。</p>
          </div>
          <pre>${escapeHtml(error.message || "unknown startup error")}</pre>
          <dl>
            <div>
              <dt>数据目录</dt>
              <dd><code>${escapeHtml(error.data_root)}</code></dd>
            </div>
            <div>
              <dt>日志目录</dt>
              <dd><code>${escapeHtml(error.logs_root)}</code></dd>
            </div>
          </dl>
          <div class="actions">
            <button class="primary" data-action="diagnostics" ${busy ? "disabled" : ""}>生成诊断包</button>
            <button data-action="open" ${busy ? "disabled" : ""}>打开数据目录</button>
            <button data-action="retry" ${busy ? "disabled" : ""}>重试启动</button>
            <button data-action="restart" ${busy ? "disabled" : ""}>重启应用</button>
          </div>
          <div class="note">${escapeHtml(note)}</div>
        `;
      }

      async function refresh() {
        try {
          const status = await invoke("desktop_startup_status");
          if (status.error) {
            renderError(status.error);
            window.setTimeout(refresh, 5000);
            return;
          }
          renderLoading(status);
          if (!status.ready) window.setTimeout(refresh, 900);
        } catch (error) {
          phase.textContent = "waiting";
          note = error && error.message ? error.message : String(error);
          renderLoading({ starting: true, ready: false });
          window.setTimeout(refresh, 1200);
        }
      }

      root.addEventListener("click", async (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button || busy) return;
        busy = true;
        const action = button.getAttribute("data-action");
        try {
          if (action === "open") {
            await invoke("open_data_dir");
            note = "已请求打开数据目录。";
          } else if (action === "diagnostics") {
            const out = await invoke("export_diagnostics_bundle");
            note = `诊断包已生成：${out.path}`;
          } else if (action === "retry") {
            note = "正在重试启动。";
            await invoke("retry_desktop_startup");
          } else if (action === "restart") {
            note = "正在重启应用。";
            await invoke("restart_desktop_app");
          }
        } catch (error) {
          note = error && error.message ? error.message : String(error);
        } finally {
          busy = false;
          refresh();
        }
      });

      refresh();
    </script>
  </body>
</html>
