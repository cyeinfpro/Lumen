proxy_cache_path /var/cache/nginx/flux_temp_images
                 levels=1:2
                 keys_zone=flux_temp_images:20m
                 max_size=2g
                 inactive=1d
                 use_temp_path=off;

upstream flux_infpro_me_api {
  server 82.152.164.223:8080 max_fails=3 fail_timeout=10s;
  keepalive 64;
  keepalive_requests 1000;
  keepalive_timeout 60s;
}

upstream flux_infpro_me_image_job {
  server 82.152.164.223:80 max_fails=3 fail_timeout=10s;
  keepalive 32;
  keepalive_requests 1000;
  keepalive_timeout 60s;
}

server {
  listen 80;
  server_name flux.infpro.me;
  add_header X-Nexus-Site flux.infpro.me always;
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  # ACME HTTP-01 challenge
  location ^~ /.well-known/acme-challenge/ {
    root /www/wwwroot/flux.infpro.me;
    default_type "text/plain";
    try_files $uri =404;
  }
  location ^~ / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name flux.infpro.me;
  add_header X-Nexus-Site flux.infpro.me always;
  add_header Strict-Transport-Security "max-age=31536000" always;

  ssl_certificate /etc/ssl/nexus/flux.infpro.me/fullchain.pem;
  ssl_certificate_key /etc/ssl/nexus/flux.infpro.me/privkey.pem;

  access_log /var/log/nginx/flux.infpro.me.access.log nexus_upstream;
  error_log /var/log/nginx/flux.infpro.me.error.log warn;

  client_max_body_size 128m;
  client_body_buffer_size 1m;
  client_body_timeout 600s;
  send_timeout 600s;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # ACME HTTP-01 challenge
  location ^~ /.well-known/acme-challenge/ {
    root /www/wwwroot/flux.infpro.me;
    default_type "text/plain";
    try_files $uri =404;
  }

  location ^~ /v1/image-jobs {
    proxy_pass http://flux_infpro_me_image_job;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Accel-Buffering no;
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;
    chunked_transfer_encoding on;
    proxy_connect_timeout 10s;
    proxy_send_timeout 1800s;
    proxy_read_timeout 3600s;
    proxy_redirect off;
  }

  location ^~ /images/temp/ {
    proxy_pass http://flux_infpro_me_image_job;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    proxy_buffering on;
    proxy_buffers 16 64k;
    proxy_buffer_size 64k;
    proxy_busy_buffers_size 128k;
    proxy_max_temp_file_size 512m;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    proxy_cache flux_temp_images;
    proxy_cache_key "$scheme$host$request_uri";
    proxy_cache_methods GET HEAD;
    proxy_cache_valid 200 206 1d;
    proxy_cache_valid 301 302 10m;
    proxy_cache_valid 404 1m;
    proxy_ignore_headers Cache-Control Expires Set-Cookie Vary;
    proxy_hide_header Set-Cookie;
    proxy_hide_header Vary;
    proxy_set_header Cookie "";
    proxy_cache_lock on;
    proxy_cache_lock_timeout 10s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_revalidate on;

    add_header X-Cache-Status $upstream_cache_status always;
    add_header X-Nexus-Site flux.infpro.me always;
    add_header Strict-Transport-Security "max-age=31536000" always;
  }

  location ^~ /refs/ {
    proxy_pass http://flux_infpro_me_image_job;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_buffering off;
    proxy_cache off;
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_redirect off;
  }

  location ^~ /v1/refs {
    proxy_pass http://flux_infpro_me_image_job;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_redirect off;
  }

  location ^~ /v1/ {
    proxy_pass http://flux_infpro_me_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Accel-Buffering no;
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;
    chunked_transfer_encoding on;
    proxy_connect_timeout 10s;
    proxy_send_timeout 1800s;
    proxy_read_timeout 3600s;
    proxy_redirect off;
  }

  location / {
    proxy_pass http://flux_infpro_me_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    proxy_buffering on;
    proxy_buffers 16 64k;
    proxy_buffer_size 64k;
    proxy_busy_buffers_size 128k;
    proxy_max_temp_file_size 256m;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_redirect off;
  }
}
