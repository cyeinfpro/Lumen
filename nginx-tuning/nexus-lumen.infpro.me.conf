proxy_cache_path /var/cache/nginx/lumen_static
                 levels=1:2
                 keys_zone=lumen_static:20m
                 max_size=1g
                 inactive=30d
                 use_temp_path=off;

upstream lumen_infpro_me_app {
  server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
  keepalive 64;
  keepalive_requests 1000;
  keepalive_timeout 60s;
}

server {
  listen 80;
  server_name lumen.infpro.me;
  add_header X-Nexus-Site lumen.infpro.me always;
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  location ^~ /.well-known/acme-challenge/ {
    root /www/wwwroot/lumen.infpro.me;
    default_type "text/plain";
    try_files $uri =404;
  }
  location ^~ / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name lumen.infpro.me;
  add_header X-Nexus-Site lumen.infpro.me always;
  add_header Strict-Transport-Security "max-age=31536000" always;

  ssl_certificate /etc/ssl/nexus/lumen.infpro.me/fullchain.pem;
  ssl_certificate_key /etc/ssl/nexus/lumen.infpro.me/privkey.pem;
  ssl_session_cache shared:LUMEN_SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;
  ssl_protocols TLSv1.2 TLSv1.3;

  access_log /var/log/nginx/lumen.infpro.me.access.log nexus_upstream;
  error_log /var/log/nginx/lumen.infpro.me.error.log warn;

  client_max_body_size 128m;
  client_body_buffer_size 1m;
  client_body_timeout 600s;
  send_timeout 600s;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  location ^~ /.well-known/acme-challenge/ {
    root /www/wwwroot/lumen.infpro.me;
    default_type "text/plain";
    try_files $uri =404;
  }

  location ^~ /_next/static/ {
    proxy_pass http://lumen_infpro_me_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    proxy_buffering on;
    proxy_buffers 16 64k;
    proxy_buffer_size 64k;
    proxy_busy_buffers_size 128k;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    proxy_cache lumen_static;
    proxy_cache_key "$scheme$host$request_uri";
    proxy_cache_methods GET HEAD;
    proxy_cache_valid 200 30d;
    proxy_cache_valid 301 302 1h;
    proxy_cache_valid 404 5m;
    proxy_ignore_headers Cache-Control Expires Set-Cookie Vary;
    proxy_hide_header Cache-Control;
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header Set-Cookie;
    proxy_hide_header Vary;
    proxy_set_header Cookie "";
    proxy_cache_lock on;
    proxy_cache_lock_timeout 10s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_revalidate on;

    add_header X-Cache-Status $upstream_cache_status always;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Nexus-Site lumen.infpro.me always;
    add_header Strict-Transport-Security "max-age=31536000" always;
  }

  location ^~ /api/ {
    proxy_pass http://lumen_infpro_me_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection $nexus_connection_upgrade;
    proxy_set_header Upgrade $http_upgrade;
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;
    proxy_connect_timeout 10s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_redirect off;
    proxy_hide_header Strict-Transport-Security;
  }

  location / {
    proxy_pass http://lumen_infpro_me_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection $nexus_connection_upgrade;
    proxy_set_header Upgrade $http_upgrade;

    proxy_buffering on;
    proxy_buffers 16 64k;
    proxy_buffer_size 64k;
    proxy_busy_buffers_size 128k;
    proxy_max_temp_file_size 256m;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_redirect off;
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header X-Powered-By;
  }
}
