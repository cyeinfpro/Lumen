log_format image_job_upstream '$remote_addr - $remote_user [$time_local] "$request" '
                              '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                              'host=$host req_time=$request_time upstream=$upstream_addr '
                              'upstream_status=$upstream_status upstream_connect=$upstream_connect_time '
                              'upstream_header=$upstream_header_time upstream_response=$upstream_response_time';

upstream image_job_app {
  server 127.0.0.1:8091 max_fails=3 fail_timeout=10s;
  keepalive 64;
  keepalive_requests 1000;
  keepalive_timeout 60s;
}

upstream flux_api_backend {
  server 127.0.0.1:8080 max_fails=3 fail_timeout=10s;
  keepalive 64;
  keepalive_requests 1000;
  keepalive_timeout 60s;
}

server {
  listen 80;
  listen [::]:80;
  server_name flux.infpro.me;

  add_header X-Image-Job-Site hk-hy always;

  client_max_body_size 500M;
  client_body_buffer_size 1m;
  client_body_timeout 600s;
  send_timeout 1800s;

  access_log /var/log/nginx/flux-image-job.access.log image_job_upstream;
  error_log /var/log/nginx/flux-image-job.error.log warn;

  location = /health {
    proxy_pass http://image_job_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_buffering on;
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
    access_log off;
  }

  location ^~ /v1/image-jobs {
    proxy_pass http://image_job_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Accel-Buffering no;
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;
    chunked_transfer_encoding on;
    proxy_connect_timeout 10s;
    proxy_send_timeout 1800s;
    proxy_read_timeout 3600s;
    proxy_redirect off;
  }

  location ^~ /v1/refs {
    proxy_pass http://image_job_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Accel-Buffering no;
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;
    chunked_transfer_encoding on;
    proxy_connect_timeout 10s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    proxy_redirect off;
  }

  location ^~ /refs/ {
    alias /opt/image-job/data/refs/;
    try_files $uri =404;
    expires 1d;
    etag on;
    add_header Cache-Control "public, max-age=86400" always;
    add_header X-Refs-Source "image-job-hk" always;
    add_header X-Image-Job-Site hk-hy always;
    access_log off;
  }

  location ^~ /images/temp/ {
    alias /opt/image-job/data/images/temp/;
    try_files $uri =404;
    expires 1d;
    etag on;
    add_header Cache-Control "public, max-age=86400" always;
    add_header X-Images-Source "image-job-hk" always;
    add_header X-Image-Job-Site hk-hy always;
  }

  location / {
    proxy_pass http://flux_api_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Accel-Buffering no;
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;
    chunked_transfer_encoding on;
    proxy_connect_timeout 10s;
    proxy_send_timeout 1800s;
    proxy_read_timeout 3600s;
    proxy_redirect off;
  }
}
