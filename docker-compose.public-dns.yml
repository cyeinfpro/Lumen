# Optional worker DNS override for networks where Docker's embedded resolver is slow.
# Use explicitly: docker compose -f docker-compose.yml -f docker-compose.public-dns.yml up -d

services:
  worker:
    dns:
      - "${LUMEN_WORKER_DNS_PRIMARY:-1.1.1.1}"
      - "${LUMEN_WORKER_DNS_SECONDARY:-8.8.8.8}"
