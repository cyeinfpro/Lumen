name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check version consistency
        run: python3 scripts/version.py check
      - name: Check upload body size config
        run: |
          python3 - <<'PY'
          from pathlib import Path
          nginx = Path("deploy/nginx.conf.example").read_text(encoding="utf-8")
          next_config = Path("apps/web/next.config.ts").read_text(encoding="utf-8")
          api_main = Path("apps/api/app/main.py").read_text(encoding="utf-8")
          video_routes = Path("apps/api/app/routes/videos.py").read_text(encoding="utf-8")
          if "client_max_body_size 80m;" not in nginx:
              raise SystemExit("deploy/nginx.conf.example must keep client_max_body_size 80m")
          if 'proxyClientMaxBodySize: "80mb"' not in next_config:
              raise SystemExit("apps/web/next.config.ts must keep proxyClientMaxBodySize 80mb")
          if "_MAX_REQUEST_BYTES = 66 * 1024 * 1024" not in api_main:
              raise SystemExit("apps/api/app/main.py must keep the 66 MiB raw request limit")
          if "_VIDEO_REFERENCE_UPLOAD_MAX_BYTES = 64 * 1024 * 1024" not in video_routes:
              raise SystemExit("apps/api/app/routes/videos.py must keep the 64 MiB video upload limit")
          PY
      - name: Check release tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: python3 scripts/version.py assert-tag "${GITHUB_REF_NAME}"

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lumen_test
          POSTGRES_PASSWORD: lumen_test
          POSTGRES_DB: lumen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lumen_test -d lumen_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      LUMEN_TEST_POSTGRES_URL: postgresql+asyncpg://lumen_test:lumen_test@127.0.0.1:5432/lumen_test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Setup Python
        run: uv python install 3.12
      - name: Install dependencies
        # virtual workspace root → 必须 --all-packages 才会装所有 member（api/worker/tgbot/core）的依赖
        run: uv sync --all-packages
      - name: Run backend tests (worker / api / core)
        run: bash scripts/test.sh

  frontend:
    runs-on: ubuntu-latest
    env:
      WEB_GATE_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Run frontend tests
        run: npm test
      - name: Run web gate hardening regressions
        run: node --test __tests__/web-gate-hardening.test.mjs
      - name: Audit interactive hit areas
        run: node scripts/audit-hit-area.mjs
      - run: npm run lint
      - run: npm run type-check
      - name: Build (smoke test)
        env:
          LUMEN_BACKEND_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_API_BASE: /api
        run: npm run build
