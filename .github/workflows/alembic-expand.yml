name: Alembic expand-contract lint

on:
  pull_request:
    paths:
      - "apps/api/alembic/versions/*.py"
      - "scripts/lint_alembic_breaking.py"
      - ".github/workflows/alembic-expand.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Check Alembic upgrade safety
        run: python scripts/lint_alembic_breaking.py
