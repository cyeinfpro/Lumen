name: Desktop Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  unit-docker-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check version
        run: python3 scripts/version.py check
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Python
        run: uv python install 3.12
      - name: Install backend dependencies
        run: uv sync --all-packages
      - name: Backend tests
        run: bash scripts/test.sh -q
      - name: Desktop portability audit
        run: python3 scripts/audit-desktop-portability.py > desktop-portability.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-portability
          path: desktop-portability.json

  desktop-smoke-mac-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Desktop web build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_LUMEN_RUNTIME: desktop
          LUMEN_BACKEND_URL: http://127.0.0.1:8000
        run: |
          npm ci
          npm run type-check
          npm run build:desktop
      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
      - name: Rust check
        working-directory: apps/desktop
        run: cargo check

  desktop-smoke-win-x64:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Desktop web build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_LUMEN_RUNTIME: desktop
          LUMEN_BACKEND_URL: http://127.0.0.1:8000
        run: |
          npm ci
          npm run type-check
          npm run build:desktop
      - name: Setup Rust
        shell: pwsh
        run: |
          rustup update stable
          rustup default stable
      - name: Rust check
        working-directory: apps/desktop
        run: cargo check

  build-mac-arm64:
    needs: [unit-docker-regression, desktop-smoke-mac-arm64]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Python
        run: uv python install 3.12
      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
      - name: Install macOS packaging dependencies
        run: |
          brew list libpq >/dev/null 2>&1 || brew install libpq
          echo "$(brew --prefix libpq)/bin" >> "$GITHUB_PATH"
      - name: Build dmg
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: apps/desktop/packaging/scripts/build-mac.sh
      - name: Smoke packaged dmg
        run: bash apps/desktop/packaging/scripts/smoke-mac.sh apps/desktop/target/release/bundle/dmg/Lumen_$(cat VERSION)_aarch64.dmg
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Lumen-mac-arm64
          path: |
            apps/desktop/target/release/bundle/dmg/*.dmg
            apps/desktop/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/target/release/bundle/macos/*.app.tar.gz.sig

  build-win-x64:
    needs: [unit-docker-regression, desktop-smoke-win-x64]
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Python
        shell: pwsh
        run: uv python install 3.12
      - name: Setup Rust
        shell: pwsh
        run: |
          rustup update stable
          rustup default stable
      - name: Build NSIS
        shell: pwsh
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: apps/desktop/packaging/scripts/build-win.ps1
      - name: Smoke release app
        shell: pwsh
        run: apps/desktop/packaging/scripts/smoke-win.ps1 -Executable apps/desktop/target/release/lumen-desktop.exe
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Lumen-win-x64
          path: |
            apps/desktop/target/release/bundle/nsis/*.exe
            apps/desktop/target/release/bundle/nsis/*.nsis.zip
            apps/desktop/target/release/bundle/nsis/*.nsis.zip.sig

  publish-updater-manifest:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-mac-arm64, build-win-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: desktop-artifacts
      - name: Create latest.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
          mac_update="$(find desktop-artifacts -type f -name '*.app.tar.gz' | sort | head -n 1)"
          win_update="$(find desktop-artifacts -type f -name '*.nsis.zip' | sort | head -n 1)"
          test -n "$mac_update"
          test -n "$win_update"
          python3 apps/desktop/packaging/scripts/create-updater-manifest.py \
            --version "$tag" \
            --base-url "$base_url" \
            --notes "see https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag}" \
            --output desktop-artifacts/latest.json \
            --artifact "darwin-aarch64=$mac_update" \
            --artifact "windows-x86_64=$win_update"
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "Desktop and Docker release ${tag}"
          mapfile -t assets < <(find desktop-artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.exe' -o \
            -name '*.app.tar.gz' -o \
            -name '*.app.tar.gz.sig' -o \
            -name '*.nsis.zip' -o \
            -name '*.nsis.zip.sig' -o \
            -name 'latest.json' \
          \) | sort)
          test "${#assets[@]}" -gt 0
          gh release upload "$tag" "${assets[@]}" --clobber
