name: Desktop Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  unit-docker-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check version
        run: python3 scripts/version.py check
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Python
        run: uv python install 3.12
      - name: Install backend dependencies
        run: uv sync --all-packages
      - name: Backend tests
        run: bash scripts/test.sh -q
      - name: Desktop portability audit
        run: python3 scripts/audit-desktop-portability.py > desktop-portability.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-portability
          path: desktop-portability.json

  desktop-smoke-mac-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Desktop web build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_LUMEN_RUNTIME: desktop
          LUMEN_BACKEND_URL: http://127.0.0.1:8000
        run: |
          npm ci
          npm run type-check
          npm run build:desktop
      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
      - name: Rust check
        working-directory: apps/desktop
        run: cargo check
      - name: Rust tests
        working-directory: apps/desktop
        run: cargo test --bin lumen-desktop

  desktop-smoke-mac-x64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Desktop web build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_LUMEN_RUNTIME: desktop
          LUMEN_BACKEND_URL: http://127.0.0.1:8000
        run: |
          npm ci
          npm run type-check
          npm run build:desktop
      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
      - name: Rust check
        working-directory: apps/desktop
        run: cargo check
      - name: Rust tests
        working-directory: apps/desktop
        run: cargo test --bin lumen-desktop

  desktop-smoke-win-x64:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Desktop web build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_LUMEN_RUNTIME: desktop
          LUMEN_BACKEND_URL: http://127.0.0.1:8000
        run: |
          npm ci
          npm run type-check
          npm run build:desktop
      - name: Setup Rust
        shell: pwsh
        run: |
          rustup update stable
          rustup default stable
      - name: Rust check
        working-directory: apps/desktop
        run: cargo check
      - name: Rust tests
        working-directory: apps/desktop
        run: cargo test --bin lumen-desktop

  build-mac-arm64:
    needs: [unit-docker-regression, desktop-smoke-mac-arm64]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Python
        run: uv python install 3.12
      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
      - name: Install macOS packaging dependencies
        run: |
          brew list libpq >/dev/null 2>&1 || brew install libpq
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
      - name: Validate mac signing, notarization, and updater secrets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for name in APPLE_SIGNING_IDENTITY APPLE_ID APPLE_TEAM_ID APPLE_APP_PASSWORD TAURI_UPDATER_PUBKEY TAURI_SIGNING_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing secrets required for tagged mac desktop releases:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi
          echo "Updater signing secrets are required for tagged desktop releases."
      - name: Build mac bundles
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: apps/desktop/packaging/scripts/build-mac.sh
      - name: Normalize mac updater artifact names
        if: startsWith(github.ref, 'refs/tags/')
        env:
          MAC_UPDATER_ARCH: aarch64
        run: |
          set -euo pipefail
          shopt -s nullglob
          version="$(cat VERSION)"
          archive_dir="apps/desktop/target/release/bundle/macos"
          archives=("$archive_dir"/*.app.tar.gz)
          if [ "${#archives[@]}" -ne 1 ]; then
            echo "expected exactly one mac updater archive in $archive_dir" >&2
            printf ' - %s\n' "${archives[@]:-}" >&2
            exit 1
          fi
          archive="${archives[0]}"
          target="$archive_dir/Lumen_${version}_${MAC_UPDATER_ARCH}.app.tar.gz"
          if [ "$archive" != "$target" ]; then
            sig="${archive}.sig"
            mv "$archive" "$target"
            if [ -f "$sig" ]; then
              mv "$sig" "${target}.sig"
            fi
          fi
          test -f "$target"
          test -f "${target}.sig"
      - name: Notarize mac dmgs
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(apps/desktop/target/release/bundle/dmg/*.dmg)
          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "missing macOS dmg for notarization" >&2
            exit 1
          fi
          for dmg in "${dmgs[@]}"; do
            apps/desktop/packaging/scripts/notarize-mac.sh "$dmg"
          done
      - name: Verify notarized mac packages
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(apps/desktop/target/release/bundle/dmg/*.dmg)
          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "missing macOS dmg for notarization verification" >&2
            exit 1
          fi
          for dmg in "${dmgs[@]}"; do
            xattr -w com.apple.quarantine "0081;00000000;GitHubActions;${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" "$dmg"
            xcrun stapler validate "$dmg"
            spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg"
            work="$(mktemp -d)"
            mount="$work/mnt"
            mkdir -p "$mount"
            hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount" -quiet
            app="$mount/Lumen.app"
            if [ ! -d "$app" ]; then
              echo "missing Lumen.app in notarized dmg: $dmg" >&2
              find "$mount" -maxdepth 2 -print >&2
              hdiutil detach "$mount" -quiet >/dev/null 2>&1 || hdiutil detach "$mount" -force -quiet >/dev/null 2>&1 || true
              rm -rf "$work"
              exit 1
            fi
            codesign --verify --deep --strict --verbose=2 "$app"
            copied_app="$work/Lumen.app"
            cp -R "$app" "$copied_app"
            xattr -rw com.apple.quarantine "0081;00000000;GitHubActions;${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" "$copied_app"
            spctl --assess --type execute --verbose=4 "$copied_app"
            hdiutil detach "$mount" -quiet >/dev/null 2>&1 || hdiutil detach "$mount" -force -quiet >/dev/null 2>&1 || true
            rm -rf "$work"
          done
      - name: Smoke packaged dmg
        run: bash apps/desktop/packaging/scripts/smoke-mac.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Lumen-mac-arm64
          path: |
            apps/desktop/target/release/bundle/dmg/*.dmg
            apps/desktop/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/target/release/bundle/macos/*.app.tar.gz.sig

  build-mac-x64:
    needs: [unit-docker-regression, desktop-smoke-mac-x64]
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Python
        run: uv python install 3.12
      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
      - name: Install macOS packaging dependencies
        run: |
          brew list libpq >/dev/null 2>&1 || brew install libpq
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
      - name: Validate mac signing, notarization, and updater secrets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for name in APPLE_SIGNING_IDENTITY APPLE_ID APPLE_TEAM_ID APPLE_APP_PASSWORD TAURI_UPDATER_PUBKEY TAURI_SIGNING_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing secrets required for tagged mac desktop releases:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi
          echo "Updater signing secrets are required for tagged desktop releases."
      - name: Build mac bundles
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: apps/desktop/packaging/scripts/build-mac.sh
      - name: Normalize mac updater artifact names
        if: startsWith(github.ref, 'refs/tags/')
        env:
          MAC_UPDATER_ARCH: x64
        run: |
          set -euo pipefail
          shopt -s nullglob
          version="$(cat VERSION)"
          archive_dir="apps/desktop/target/release/bundle/macos"
          archives=("$archive_dir"/*.app.tar.gz)
          if [ "${#archives[@]}" -ne 1 ]; then
            echo "expected exactly one mac updater archive in $archive_dir" >&2
            printf ' - %s\n' "${archives[@]:-}" >&2
            exit 1
          fi
          archive="${archives[0]}"
          target="$archive_dir/Lumen_${version}_${MAC_UPDATER_ARCH}.app.tar.gz"
          if [ "$archive" != "$target" ]; then
            sig="${archive}.sig"
            mv "$archive" "$target"
            if [ -f "$sig" ]; then
              mv "$sig" "${target}.sig"
            fi
          fi
          test -f "$target"
          test -f "${target}.sig"
      - name: Notarize mac dmgs
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(apps/desktop/target/release/bundle/dmg/*.dmg)
          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "missing macOS dmg for notarization" >&2
            exit 1
          fi
          for dmg in "${dmgs[@]}"; do
            apps/desktop/packaging/scripts/notarize-mac.sh "$dmg"
          done
      - name: Verify notarized mac packages
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(apps/desktop/target/release/bundle/dmg/*.dmg)
          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "missing macOS dmg for notarization verification" >&2
            exit 1
          fi
          for dmg in "${dmgs[@]}"; do
            xattr -w com.apple.quarantine "0081;00000000;GitHubActions;${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" "$dmg"
            xcrun stapler validate "$dmg"
            spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg"
            work="$(mktemp -d)"
            mount="$work/mnt"
            mkdir -p "$mount"
            hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount" -quiet
            app="$mount/Lumen.app"
            if [ ! -d "$app" ]; then
              echo "missing Lumen.app in notarized dmg: $dmg" >&2
              find "$mount" -maxdepth 2 -print >&2
              hdiutil detach "$mount" -quiet >/dev/null 2>&1 || hdiutil detach "$mount" -force -quiet >/dev/null 2>&1 || true
              rm -rf "$work"
              exit 1
            fi
            codesign --verify --deep --strict --verbose=2 "$app"
            copied_app="$work/Lumen.app"
            cp -R "$app" "$copied_app"
            xattr -rw com.apple.quarantine "0081;00000000;GitHubActions;${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" "$copied_app"
            spctl --assess --type execute --verbose=4 "$copied_app"
            hdiutil detach "$mount" -quiet >/dev/null 2>&1 || hdiutil detach "$mount" -force -quiet >/dev/null 2>&1 || true
            rm -rf "$work"
          done
      - name: Smoke packaged dmg
        run: bash apps/desktop/packaging/scripts/smoke-mac.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Lumen-mac-x64
          path: |
            apps/desktop/target/release/bundle/dmg/*.dmg
            apps/desktop/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/target/release/bundle/macos/*.app.tar.gz.sig

  build-win-x64:
    needs: [unit-docker-regression, desktop-smoke-win-x64]
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Python
        shell: pwsh
        run: uv python install 3.12
      - name: Setup Rust
        shell: pwsh
        run: |
          rustup update stable
          rustup default stable
      - name: Configure Windows Authenticode signing
        shell: pwsh
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          WINDOWS_SIGNING_THUMBPRINT: ${{ secrets.WINDOWS_SIGNING_THUMBPRINT }}
          WINDOWS_SIGNING_CERT_PATH: ${{ secrets.WINDOWS_SIGNING_CERT_PATH }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
          WINDOWS_SIGNING_CERT_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_PFX_BASE64 }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          $ErrorActionPreference = "Stop"
          $isTag = "${{ startsWith(github.ref, 'refs/tags/') }}" -eq "true"
          $missing = @()
          if ($isTag -and -not $env:TAURI_UPDATER_PUBKEY) {
            $missing += "TAURI_UPDATER_PUBKEY"
          }
          if ($isTag -and -not $env:TAURI_SIGNING_PRIVATE_KEY) {
            $missing += "TAURI_SIGNING_PRIVATE_KEY"
          }
          if ($isTag -and -not $env:WINDOWS_SIGNING_THUMBPRINT -and -not $env:WINDOWS_SIGNING_CERT_PATH -and -not $env:WINDOWS_SIGNING_CERT_PFX_BASE64) {
            $missing += "WINDOWS_SIGNING_THUMBPRINT or WINDOWS_SIGNING_CERT_PATH or WINDOWS_SIGNING_CERT_PFX_BASE64"
          }
          if ($missing.Count -gt 0) {
            Write-Error ("Missing secrets required for tagged Windows desktop releases:`n - " + ($missing -join "`n - "))
          }
          if ($env:WINDOWS_SIGNING_CERT_PFX_BASE64) {
            $certPath = Join-Path $env:RUNNER_TEMP "lumen-windows-signing.pfx"
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String(($env:WINDOWS_SIGNING_CERT_PFX_BASE64 -replace "\s", "")))
            Add-Content -Path $env:GITHUB_ENV -Value "WINDOWS_SIGNING_CERT_PATH=$certPath"
          } elseif ($env:WINDOWS_SIGNING_CERT_PATH) {
            Add-Content -Path $env:GITHUB_ENV -Value "WINDOWS_SIGNING_CERT_PATH=$env:WINDOWS_SIGNING_CERT_PATH"
          }
          if ($env:WINDOWS_SIGNING_THUMBPRINT) {
            Add-Content -Path $env:GITHUB_ENV -Value "WINDOWS_SIGNING_THUMBPRINT=$env:WINDOWS_SIGNING_THUMBPRINT"
          }
          if ($env:WINDOWS_SIGNING_CERT_PASSWORD) {
            Add-Content -Path $env:GITHUB_ENV -Value "WINDOWS_SIGNING_CERT_PASSWORD=$env:WINDOWS_SIGNING_CERT_PASSWORD"
          }
          if ($env:WINDOWS_TIMESTAMP_URL) {
            Add-Content -Path $env:GITHUB_ENV -Value "WINDOWS_TIMESTAMP_URL=$env:WINDOWS_TIMESTAMP_URL"
          }
          if (-not $env:WINDOWS_SIGNING_THUMBPRINT -and -not $env:WINDOWS_SIGNING_CERT_PATH -and -not $env:WINDOWS_SIGNING_CERT_PFX_BASE64) {
            Write-Host "No Windows Authenticode certificate configured; unsigned non-tag build is allowed."
          }
      - name: Build NSIS
        shell: pwsh
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: apps/desktop/packaging/scripts/build-win.ps1
      - name: Verify Authenticode signed installers
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bundleRoot = "apps/desktop/target/release/bundle/nsis"
          $installers = @(Get-ChildItem -Path $bundleRoot -Filter *.exe -File)
          if ($installers.Count -eq 0) {
            throw "missing Windows NSIS installer for Authenticode verification: $bundleRoot"
          }
          foreach ($installer in $installers) {
            $signature = Get-AuthenticodeSignature -FilePath $installer.FullName
            if ($signature.Status -ne "Valid") {
              throw "invalid Authenticode signature for $($installer.FullName): $($signature.Status) $($signature.StatusMessage)"
            }
            Write-Host "valid_authenticode=$($installer.FullName)"
          }
          $updaters = @(Get-ChildItem -Path $bundleRoot -Filter *.nsis.zip -File)
          if ($updaters.Count -eq 0) {
            throw "missing Windows updater zip for Authenticode verification: $bundleRoot"
          }
          foreach ($updater in $updaters) {
            $extractRoot = Join-Path $env:RUNNER_TEMP ("nsis-update-" + [IO.Path]::GetFileNameWithoutExtension($updater.Name))
            Remove-Item -Recurse -Force $extractRoot -ErrorAction SilentlyContinue
            Expand-Archive -Path $updater.FullName -DestinationPath $extractRoot -Force
            $embeddedInstallers = @(Get-ChildItem -Path $extractRoot -Filter *.exe -File -Recurse)
            if ($embeddedInstallers.Count -eq 0) {
              throw "missing embedded NSIS installer inside updater zip: $($updater.FullName)"
            }
            foreach ($embedded in $embeddedInstallers) {
              $signature = Get-AuthenticodeSignature -FilePath $embedded.FullName
              if ($signature.Status -ne "Valid") {
                throw "invalid embedded updater installer signature for $($embedded.FullName): $($signature.Status) $($signature.StatusMessage)"
              }
              Write-Host "valid_authenticode_updater=$($updater.FullName)::embedded=$($embedded.FullName)"
            }
          }
      - name: Smoke release app
        shell: pwsh
        run: apps/desktop/packaging/scripts/smoke-win.ps1 -Executable apps/desktop/target/release/lumen-desktop.exe
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Lumen-win-x64
          path: |
            apps/desktop/target/release/bundle/nsis/*.exe
            apps/desktop/target/release/bundle/nsis/*.nsis.zip
            apps/desktop/target/release/bundle/nsis/*.nsis.zip.sig

  build-win-arm64:
    needs: [unit-docker-regression, desktop-smoke-win-x64]
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Python
        shell: pwsh
        run: uv python install 3.12
      - name: Setup Rust
        shell: pwsh
        run: |
          rustup update stable
          rustup default stable
          rustup target add aarch64-pc-windows-msvc
      - name: Configure Windows Authenticode signing
        shell: pwsh
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          WINDOWS_SIGNING_THUMBPRINT: ${{ secrets.WINDOWS_SIGNING_THUMBPRINT }}
          WINDOWS_SIGNING_CERT_PATH: ${{ secrets.WINDOWS_SIGNING_CERT_PATH }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
          WINDOWS_SIGNING_CERT_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_PFX_BASE64 }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          $ErrorActionPreference = "Stop"
          $isTag = "${{ startsWith(github.ref, 'refs/tags/') }}" -eq "true"
          $missing = @()
          if ($isTag -and -not $env:TAURI_UPDATER_PUBKEY) {
            $missing += "TAURI_UPDATER_PUBKEY"
          }
          if ($isTag -and -not $env:TAURI_SIGNING_PRIVATE_KEY) {
            $missing += "TAURI_SIGNING_PRIVATE_KEY"
          }
          if ($isTag -and -not $env:WINDOWS_SIGNING_THUMBPRINT -and -not $env:WINDOWS_SIGNING_CERT_PATH -and -not $env:WINDOWS_SIGNING_CERT_PFX_BASE64) {
            $missing += "WINDOWS_SIGNING_THUMBPRINT or WINDOWS_SIGNING_CERT_PATH or WINDOWS_SIGNING_CERT_PFX_BASE64"
          }
          if ($missing.Count -gt 0) {
            Write-Error ("Missing secrets required for tagged Windows desktop releases:`n - " + ($missing -join "`n - "))
          }
          if ($env:WINDOWS_SIGNING_CERT_PFX_BASE64) {
            $certPath = Join-Path $env:RUNNER_TEMP "lumen-windows-signing.pfx"
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String(($env:WINDOWS_SIGNING_CERT_PFX_BASE64 -replace "\s", "")))
            Add-Content -Path $env:GITHUB_ENV -Value "WINDOWS_SIGNING_CERT_PATH=$certPath"
          } elseif ($env:WINDOWS_SIGNING_CERT_PATH) {
            Add-Content -Path $env:GITHUB_ENV -Value "WINDOWS_SIGNING_CERT_PATH=$env:WINDOWS_SIGNING_CERT_PATH"
          }
          if ($env:WINDOWS_SIGNING_THUMBPRINT) {
            Add-Content -Path $env:GITHUB_ENV -Value "WINDOWS_SIGNING_THUMBPRINT=$env:WINDOWS_SIGNING_THUMBPRINT"
          }
          if ($env:WINDOWS_SIGNING_CERT_PASSWORD) {
            Add-Content -Path $env:GITHUB_ENV -Value "WINDOWS_SIGNING_CERT_PASSWORD=$env:WINDOWS_SIGNING_CERT_PASSWORD"
          }
          if ($env:WINDOWS_TIMESTAMP_URL) {
            Add-Content -Path $env:GITHUB_ENV -Value "WINDOWS_TIMESTAMP_URL=$env:WINDOWS_TIMESTAMP_URL"
          }
          if (-not $env:WINDOWS_SIGNING_THUMBPRINT -and -not $env:WINDOWS_SIGNING_CERT_PATH -and -not $env:WINDOWS_SIGNING_CERT_PFX_BASE64) {
            Write-Host "No Windows Authenticode certificate configured; unsigned non-tag build is allowed."
          }
      - name: Build NSIS
        shell: pwsh
        env:
          LUMEN_DESKTOP_BUILD_TARGET: aarch64-pc-windows-msvc
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: apps/desktop/packaging/scripts/build-win.ps1
      - name: Verify Authenticode signed installers
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bundleRoot = "apps/desktop/target/aarch64-pc-windows-msvc/release/bundle/nsis"
          $installers = @(Get-ChildItem -Path $bundleRoot -Filter *.exe -File)
          if ($installers.Count -eq 0) {
            throw "missing Windows ARM64 NSIS installer for Authenticode verification: $bundleRoot"
          }
          foreach ($installer in $installers) {
            $signature = Get-AuthenticodeSignature -FilePath $installer.FullName
            if ($signature.Status -ne "Valid") {
              throw "invalid Authenticode signature for $($installer.FullName): $($signature.Status) $($signature.StatusMessage)"
            }
            Write-Host "valid_authenticode=$($installer.FullName)"
          }
          $updaters = @(Get-ChildItem -Path $bundleRoot -Filter *.nsis.zip -File)
          if ($updaters.Count -eq 0) {
            throw "missing Windows ARM64 updater zip for Authenticode verification: $bundleRoot"
          }
          foreach ($updater in $updaters) {
            $extractRoot = Join-Path $env:RUNNER_TEMP ("nsis-update-arm64-" + [IO.Path]::GetFileNameWithoutExtension($updater.Name))
            Remove-Item -Recurse -Force $extractRoot -ErrorAction SilentlyContinue
            Expand-Archive -Path $updater.FullName -DestinationPath $extractRoot -Force
            $embeddedInstallers = @(Get-ChildItem -Path $extractRoot -Filter *.exe -File -Recurse)
            if ($embeddedInstallers.Count -eq 0) {
              throw "missing embedded ARM64 NSIS installer inside updater zip: $($updater.FullName)"
            }
            foreach ($embedded in $embeddedInstallers) {
              $signature = Get-AuthenticodeSignature -FilePath $embedded.FullName
              if ($signature.Status -ne "Valid") {
                throw "invalid embedded ARM64 updater installer signature for $($embedded.FullName): $($signature.Status) $($signature.StatusMessage)"
              }
              Write-Host "valid_authenticode_updater=$($updater.FullName)::embedded=$($embedded.FullName)"
            }
          }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Lumen-win-arm64
          path: |
            apps/desktop/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
            apps/desktop/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip
            apps/desktop/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig

  publish-updater-manifest:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-mac-arm64, build-mac-x64, build-win-x64, build-win-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: desktop-artifacts
      - name: Create latest.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"

          find_windows_update() {
            local root="$1"
            find "$root" -type f -name '*.nsis.zip' | sort | head -n 1
          }

          find_macos_update() {
            local root="$1"
            find "$root" -type f -name '*.app.tar.gz' | sort | head -n 1
          }

          mac_arm64_update="$(find_macos_update desktop-artifacts/Lumen-mac-arm64)"
          mac_x64_update="$(find_macos_update desktop-artifacts/Lumen-mac-x64)"
          win_x64_update="$(find_windows_update desktop-artifacts/Lumen-win-x64)"
          win_arm64_update=""
          if [ -d desktop-artifacts/Lumen-win-arm64 ]; then
            win_arm64_update="$(find_windows_update desktop-artifacts/Lumen-win-arm64)"
          fi

          missing=()
          [ -n "$mac_arm64_update" ] || missing+=("darwin-aarch64 .app.tar.gz")
          [ -n "$mac_x64_update" ] || missing+=("darwin-x86_64 .app.tar.gz")
          [ -n "$win_x64_update" ] || missing+=("windows-x86_64 .nsis.zip updater")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing signed updater artifacts:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            find desktop-artifacts -type f | sort >&2
            exit 1
          fi

          args=(
            --version "$tag" \
            --base-url "$base_url" \
            --notes "see https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag}" \
            --output desktop-artifacts/latest.json \
            --artifact "darwin-aarch64=$mac_arm64_update" \
            --artifact "darwin-x86_64=$mac_x64_update" \
            --artifact "windows-x86_64=$win_x64_update"
          )
          if [ -n "$win_arm64_update" ]; then
            args+=(--artifact "windows-aarch64=$win_arm64_update")
          fi
          python3 apps/desktop/packaging/scripts/create-updater-manifest.py "${args[@]}"
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "Desktop and Docker release ${tag}"
          mapfile -t assets < <(find desktop-artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.exe' -o \
            -name '*.app.tar.gz' -o \
            -name '*.app.tar.gz.sig' -o \
            -name '*.nsis.zip' -o \
            -name '*.nsis.zip.sig' -o \
            -name 'latest.json' \
          \) | sort)
          test "${#assets[@]}" -gt 0
          gh release upload "$tag" "${assets[@]}" --clobber
