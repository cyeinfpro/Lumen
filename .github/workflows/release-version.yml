name: Release Version Gate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: python3 scripts/version.py check
      - name: Check tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: python3 scripts/version.py assert-tag "${GITHUB_REF_NAME}"
      - name: Print Docker release tags
        run: python3 scripts/version.py docker-tags
