# Build and push the four Lumen Docker images (api/worker/tgbot/web) to GHCR.
# Triggers: push to main, push of v* tag, or manual workflow_dispatch.
# Tag pushes additionally publish a GitHub Release with image references.

name: Docker Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch / tag / sha) to rebuild"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: cyeinfpro
  NPM_VERSION: "10.9.0"

jobs:
  version-check:
    name: Version consistency gate
    runs-on: ubuntu-latest
    steps:
      - name: Reject tag-like workflow dispatch refs
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && startsWith(github.event.inputs.ref, 'v')
        run: |
          echo "workflow_dispatch.ref cannot create release semantics for tag refs." >&2
          echo "Push the v* tag instead so github.ref is refs/tags/<tag>." >&2
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Check version consistency
        run: python3 scripts/version.py check
      - name: Assert tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: python3 scripts/version.py assert-tag "${GITHUB_REF_NAME}"

  quality-gate:
    name: Release quality gate
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install backend dependencies
        run: uv sync --all-packages

      - name: Python tests
        run: bash scripts/test.sh

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Web type-check
        working-directory: apps/web
        run: npm run type-check

      - name: Web build
        working-directory: apps/web
        env:
          LUMEN_BACKEND_URL: http://api:8000
          NEXT_PUBLIC_API_BASE: /api
        run: npm run build

      - name: Prepare compose env file
        run: |
          set -euo pipefail
          cp .env.example .env.ci
          db_pass="$(openssl rand -hex 32)"
          redis_pass="$(openssl rand -hex 32)"
          session_secret="$(openssl rand -hex 64)"
          image_proxy_secret="$(openssl rand -hex 32)"
          byok_secret="$(openssl rand -hex 48)"
          telegram_secret="$(openssl rand -hex 32)"
          sed -i \
            -e "s|^DB_PASSWORD=.*|DB_PASSWORD=${db_pass}|" \
            -e "s|^REDIS_PASSWORD=.*|REDIS_PASSWORD=${redis_pass}|" \
            -e "s|^SESSION_SECRET=.*|SESSION_SECRET=${session_secret}|" \
            -e "s|^IMAGE_PROXY_SECRET=.*|IMAGE_PROXY_SECRET=${image_proxy_secret}|" \
            -e "s|^BYOK_API_KEY_MASTER_SECRET=.*|BYOK_API_KEY_MASTER_SECRET=${byok_secret}|" \
            -e "s|^TELEGRAM_BOT_SHARED_SECRET=.*|TELEGRAM_BOT_SHARED_SECRET=${telegram_secret}|" \
            .env.ci
          sed -i "s|^LUMEN_COMPOSE_ENV_FILE=.*|LUMEN_COMPOSE_ENV_FILE=.env.ci|" .env.ci

      - name: Compose config
        run: docker compose --env-file .env.ci config >/tmp/lumen-compose-config.yml

      - name: Docker build smoke
        run: docker compose --env-file .env.ci build api worker web tgbot

      - name: Image start smoke
        env:
          LUMEN_DATA_ROOT: /tmp/lumen-ci-data
          # docker-compose.yml 现在用 ${LUMEN_DB_ROOT:-/opt/lumendata}/postgres；
          # 不在 CI 显式 override 的话，PG 会挂到 /opt/lumendata/postgres（无权限/不存在）。
          # 让 DB_ROOT 跟随 DATA_ROOT，与 lib.sh 的默认 fallback 行为一致。
          LUMEN_DB_ROOT: /tmp/lumen-ci-data
          LUMEN_SKIP_MIGRATION_CHECK: "1"
          COMPOSE_PROJECT_NAME: lumen-ci
        run: |
          set -euo pipefail
          mkdir -p "$LUMEN_DB_ROOT"/{postgres,redis} "$LUMEN_DATA_ROOT"/{storage,backup}
          sudo chown -R 999:999 "$LUMEN_DB_ROOT/postgres"
          sudo chown -R 999:999 "$LUMEN_DB_ROOT/redis"
          sudo chown -R 10001:10001 "$LUMEN_DATA_ROOT/storage" "$LUMEN_DATA_ROOT/backup"
          docker compose --env-file .env.ci -f docker-compose.yml -f deploy/docker/docker-compose.local.yml down -v --remove-orphans || true
          docker compose --env-file .env.ci -f docker-compose.yml -f deploy/docker/docker-compose.local.yml up -d --wait postgres redis
          docker compose --env-file .env.ci -f docker-compose.yml -f deploy/docker/docker-compose.local.yml --profile migrate run --rm migrate
          docker compose --env-file .env.ci -f docker-compose.yml -f deploy/docker/docker-compose.local.yml up -d --wait api worker web
          curl -fsS http://127.0.0.1:18000/healthz
          curl -fsS http://127.0.0.1:13000/

      - name: Cleanup smoke stack
        if: always()
        env:
          LUMEN_DATA_ROOT: /tmp/lumen-ci-data
          LUMEN_DB_ROOT: /tmp/lumen-ci-data
          COMPOSE_PROJECT_NAME: lumen-ci
        run: docker compose --env-file .env.ci -f docker-compose.yml -f deploy/docker/docker-compose.local.yml down -v --remove-orphans || true

  build:
    name: Build & push ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        # Python 镜像走 QEMU emulated 双架构（稳定，buildx 单 job 出多 arch）。
        # lumen-web 拆到 build-web/merge-web 用 native runner —— Next.js 16
        # Turbopack 在 QEMU emulated arm64 上 page collection 阶段会 SIGILL。
        image:
          - { name: lumen-api,    file: ./Dockerfile.python,    context: .,           platforms: "linux/amd64,linux/arm64" }
          - { name: lumen-worker, file: ./Dockerfile.python,    context: .,           platforms: "linux/amd64,linux/arm64" }
          - { name: lumen-tgbot,  file: ./Dockerfile.python,    context: .,           platforms: "linux/amd64,linux/arm64" }
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Reject tag-like workflow dispatch refs
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && startsWith(github.event.inputs.ref, 'v')
        run: |
          echo "workflow_dispatch.ref cannot create release semantics for tag refs." >&2
          echo "Push the v* tag instead so github.ref is refs/tags/<tag>." >&2
          exit 1

      - name: Compute build metadata
        id: meta-vars
        run: |
          short_sha=$(git rev-parse --short=7 HEAD)
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "lumen_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "lumen_version=sha-${short_sha}" >> "$GITHUB_OUTPUT"
          fi
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=sha-{{sha}}
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.source=https://github.com/cyeinfpro/Lumen
            org.opencontainers.image.version=${{ steps.meta-vars.outputs.lumen_version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          push: true
          platforms: ${{ matrix.image.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          # mode=max 保留所有中间层，否则 base / pip-install / source-copy 这种
          # 构建慢但变化少的层在下次 build 命中不到，CI 时间会从 ~6min 涨到 ~18min。
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
          build-args: |
            LUMEN_VERSION=${{ steps.meta-vars.outputs.lumen_version }}
            LUMEN_GIT_SHA=${{ github.sha }}
            LUMEN_BUILD_TIME=${{ steps.meta-vars.outputs.build_time }}
            LUMEN_REVISION=${{ github.sha }}
            LUMEN_CREATED=${{ steps.meta-vars.outputs.build_time }}

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          go install github.com/sigstore/cosign/v2/cmd/cosign@v2.6.1
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Sign pushed tags
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          while IFS= read -r image; do
            [ -n "${image}" ] || continue
            cosign sign --yes "${image}"
          done <<< "${{ steps.meta.outputs.tags }}"

  build-web:
    name: Build & push lumen-web (${{ matrix.platform.tag }})
    runs-on: ${{ matrix.platform.runs_on }}
    needs: quality-gate
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { tag: amd64, name: linux/amd64, runs_on: ubuntu-latest }
          - { tag: arm64, name: linux/arm64, runs_on: ubuntu-24.04-arm }
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Reject tag-like workflow dispatch refs
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && startsWith(github.event.inputs.ref, 'v')
        run: |
          echo "workflow_dispatch.ref cannot create release semantics for tag refs." >&2
          echo "Push the v* tag instead so github.ref is refs/tags/<tag>." >&2
          exit 1

      - name: Compute build metadata
        id: meta-vars
        run: |
          short_sha=$(git rev-parse --short=7 HEAD)
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "lumen_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "lumen_version=sha-${short_sha}" >> "$GITHUB_OUTPUT"
          fi
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          platforms: ${{ matrix.platform.name }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/lumen-web,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=lumen-web-${{ matrix.platform.tag }}
          # mode=max 保留所有中间层；Next.js 16 build 在 arm64 native runner 上
          # 编译耗时大头，没全量 cache 会让每次 push 都退化到冷启动。
          cache-to: type=gha,mode=max,scope=lumen-web-${{ matrix.platform.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/cyeinfpro/Lumen
            org.opencontainers.image.version=${{ steps.meta-vars.outputs.lumen_version }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            LUMEN_VERSION=${{ steps.meta-vars.outputs.lumen_version }}
            LUMEN_GIT_SHA=${{ github.sha }}
            LUMEN_BUILD_TIME=${{ steps.meta-vars.outputs.build_time }}
            LUMEN_REVISION=${{ github.sha }}
            LUMEN_CREATED=${{ steps.meta-vars.outputs.build_time }}
            NPM_VERSION=${{ env.NPM_VERSION }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-web-${{ matrix.platform.tag }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-web:
    name: Merge lumen-web manifest list
    runs-on: ubuntu-latest
    needs: build-web
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-web-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/lumen-web
          tags: |
            type=raw,value=sha-{{sha}}
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list & push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/lumen-web@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/lumen-web:${{ steps.meta.outputs.version }}

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          go install github.com/sigstore/cosign/v2/cmd/cosign@v2.6.1
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Sign lumen-web manifest tags
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          while IFS= read -r image; do
            [ -n "${image}" ] || continue
            cosign sign --yes "${image}"
          done <<< "${{ steps.meta.outputs.tags }}"

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build, merge-web]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compute short sha
        id: sha
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build release notes body
        id: body
        run: |
          version="${GITHUB_REF_NAME}"
          short_sha="${{ steps.sha.outputs.short_sha }}"
          registry="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}"
          {
            echo "## Lumen ${version}"
            echo ""
            echo "Commit: \`${GITHUB_SHA}\` (sha-${short_sha})"
            echo ""
            echo "### images"
            echo ""
            echo "\`\`\`"
            for svc in api worker tgbot web; do
              echo "${registry}/lumen-${svc}:${version}"
            done
            echo ""
            for svc in api worker tgbot web; do
              echo "${registry}/lumen-${svc}:sha-${short_sha}"
            done
            echo "\`\`\`"
            echo ""
            # TODO: emit alembic_heads once we can run python in this job
            # (requires uv sync + scripts to import lumen_core / alembic config).
            echo "### alembic_heads"
            echo ""
            echo "_TODO: populate alembic heads in a follow-up CI step._"
          } > release_body.md
          echo "path=release_body.md" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.body.outputs.path }}
          draft: false
          prerelease: false
